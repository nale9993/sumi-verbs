<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨 Sumi — 動詞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/wanakana/5.3.1/wanakana.min.js"></script>
<style>
:root {
  --bg:#171310; --bg2:#1f1a16; --bg3:#2a231d;
  --border:#3a2f26; --text:#e2cdb0; --text-dim:#a08870;
  --text-faint:#6a5848; --amber:#c98a3a; --amber-dim:#7a4f1a;
  --red:#b84040; --green:#4a8c5c; --cream:#f0e0c0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.6}
.app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 24px}

/* HEADER */
header{padding:28px 0 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--amber);letter-spacing:.05em}
.logo-jp{font-family:'Noto Serif JP',serif;font-size:1.2rem;color:var(--text-dim)}
.logo-sep{width:1px;height:14px;background:var(--border);display:inline-block;vertical-align:middle}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase}
.header-right{margin-left:auto;display:flex;align-items:center}
.streak{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-dim);padding:4px 10px;border:1px solid var(--border);border-radius:20px}

/* TABS */
.tab-bar{display:flex;margin-top:20px;border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px 20px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}

/* VIEWS */
.view{display:none;flex:1;flex-direction:column}
.view.active{display:flex;animation:fadeUp .2s ease}

/* LEARN BANNER */
.learn-banner{display:flex;background:linear-gradient(135deg,rgba(201,138,58,.1),rgba(201,138,58,.04));border:1px solid var(--amber-dim);border-radius:8px;padding:18px 22px;gap:16px;align-items:center;animation:fadeUp .3s ease}
.learn-banner.visible{display:flex}
.learn-banner-icon{font-size:1.4rem;flex-shrink:0}
.learn-banner-body{flex:1}
.learn-banner-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
.learn-banner-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream)}
.learn-banner-sub{font-size:.8rem;color:var(--text-dim);margin-top:2px}
.learn-banner-btn{background:var(--amber);border:none;color:#0e0c0a;font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;border-radius:4px;cursor:pointer;white-space:nowrap;font-weight:500;transition:opacity .15s}
.learn-banner-btn:hover{opacity:.85}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,6,.88);z-index:200;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px)}
.modal-overlay.visible{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:36px 40px;animation:slideUp .25s ease}
.modal-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.modal-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--cream);margin-bottom:4px}
.modal-usage{font-size:.85rem;line-height:1.7;color:var(--text);margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-usage:empty{display:none}
.modal-subtitle{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.modal-body{font-size:.88rem;line-height:1.75;color:var(--text)}
.modal-body p{margin-bottom:12px}
.modal-examples{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px 18px;margin:14px 0;display:flex;flex-direction:column;gap:9px}
.modal-ex-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.modal-ex-jp{font-family:'Noto Serif JP',serif;font-size:1rem;color:var(--cream);min-width:80px}
.modal-ex-arr{color:var(--text-faint);font-size:.8rem}
.modal-ex-res{font-family:'Noto Serif JP',serif;font-size:1rem;color:var(--amber)}
.modal-ex-en{font-size:.76rem;color:var(--text-dim);margin-left:auto;font-style:italic}
.modal-footer{margin-top:26px;padding-top:18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.got-it-btn{background:var(--amber);border:none;color:#0e0c0a;font-family:'IBM Plex Mono',monospace;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;padding:12px 28px;border-radius:4px;cursor:pointer;font-weight:500;transition:opacity .15s}
.got-it-btn:hover{opacity:.85}

/* PRACTICE TAB */
.home-hero{padding:44px 0 36px;border-bottom:1px solid var(--border)}
.home-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.2rem);font-weight:400;line-height:1.15;color:var(--cream)}
.home-hero h1 em{font-style:italic;color:var(--amber)}
.home-rule{width:48px;height:2px;background:var(--amber);margin:18px 0;opacity:.6}
.home-hero p{color:var(--text-dim);font-size:.88rem;letter-spacing:.03em}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:.63rem;letter-spacing:.28em;text-transform:uppercase;color:var(--text-dim);margin:16px 0 12px}
.section-divider{border:none;border-top:1px solid var(--border);margin:36px 0 0}

/* SRS PANEL */
.srs-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px 24px}
.srs-chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.srs-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:7px 12px}
.srs-chip-name{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--cream)}
.srs-chip-level{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--amber);background:rgba(201,138,58,.12);border:1px solid var(--amber-dim);border-radius:3px;padding:1px 5px;letter-spacing:.08em}
.srs-chip-tag{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.06em}
.srs-chip-tag.due{color:var(--green)}
.srs-chip-tag.waiting{color:var(--text-faint)}
.srs-panel-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.srs-panel-info{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--text-dim);letter-spacing:.04em}
.srs-begin-btn{background:var(--amber);border:none;color:#0e0c0a;font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:10px 22px;border-radius:4px;cursor:pointer;font-weight:500;transition:opacity .15s}
.srs-begin-btn:hover{opacity:.85}
.srs-begin-btn:disabled{opacity:.35;cursor:not-allowed}

/* FORM GRID */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px 18px 14px;cursor:pointer;transition:border-color .15s,background .15s,opacity .15s;position:relative;overflow:hidden}
.form-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);opacity:0;transition:opacity .15s}
.form-card:not(.state-cooldown):not(.state-unread):hover{background:var(--bg3);border-color:var(--amber-dim)}
.form-card:not(.state-cooldown):not(.state-unread):hover::before{opacity:1}
.form-card.state-cooldown,.form-card.state-unread{cursor:not-allowed;opacity:.55}
.form-card.state-final-ready{border-color:var(--amber);background:rgba(201,138,58,.05)}
.form-card.state-final-ready::before{opacity:1}
.form-card-badge{position:absolute;top:10px;right:10px;font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:2px 6px;border-radius:3px;letter-spacing:.1em}
.badge-active{background:rgba(201,138,58,.12);color:var(--amber);border:1px solid var(--amber-dim)}
.badge-final{background:rgba(201,138,58,.2);color:var(--amber);border:1px solid var(--amber)}
.badge-cooldown{background:transparent;color:var(--text-faint);border:1px solid var(--text-faint)}
.badge-unread{background:rgba(201,138,58,.15);color:var(--amber);border:1px solid var(--amber-dim)}
.form-card-name{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--cream);margin-bottom:8px}
.form-card-status{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-dim);letter-spacing:.04em}
.form-card-status.s-ready{color:var(--green)}
.form-card-status.s-final{color:var(--amber)}
.form-card-status.s-unread{color:var(--amber)}

.stats-bar{display:flex;gap:28px;padding:24px 0;border-top:1px solid var(--border);margin-top:auto;justify-content:center}
.stat{display:flex;flex-direction:column;gap:3px;align-items:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream);text-align:center}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);text-align:center}

/* REFERENCE */
.ref-section{margin-top:28px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ref-section-header{padding:16px 22px;background:var(--bg2);display:flex;align-items:baseline;gap:12px;cursor:pointer;user-select:none;transition:background .15s;border-bottom:1px solid var(--border)}
.ref-section-header:hover{background:var(--bg3)}
.ref-section-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--cream)}
.ref-section-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--text-faint);margin-right:10px}
.ref-section-toggle{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--text-faint);transition:transform .2s;display:inline-block}
.ref-section.open .ref-section-toggle{transform:rotate(180deg)}
.ref-subgroups{display:none}
.ref-section.open .ref-subgroups{display:block}
.ref-usage{padding:18px 22px 14px;font-size:.85rem;color:var(--text);line-height:1.75;border-bottom:1px solid var(--border);font-style:italic}
.ref-subgroup{padding:20px 22px;border-bottom:1px solid var(--border)}
.ref-subgroup:last-child{border-bottom:none}
.ref-subgroup-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);letter-spacing:.01em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ref-subgroup-body{font-size:.85rem;color:var(--text);line-height:1.7;margin-bottom:12px}
.ref-examples{background:var(--bg3);border-radius:5px;padding:12px 16px;display:flex;flex-direction:column;gap:7px}
.ref-ex-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.ref-ex-from{font-family:'Noto Serif JP',serif;font-size:.9rem;color:var(--text)}
.ref-ex-arr{color:var(--text-dim);font-size:.75rem}
.ref-ex-to{font-family:'Noto Serif JP',serif;font-size:.9rem;color:var(--amber)}
.ref-ex-en{font-size:.72rem;color:var(--text-dim);margin-left:auto;font-style:italic;font-family:'DM Sans',sans-serif}
.ref-empty{padding:56px 0;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-dim);letter-spacing:.1em;line-height:1.8}

/* DRILL */
.drill-header{padding:16px 0 14px;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.drill-meta-group{display:flex;flex-direction:column;gap:2px;align-items:center;flex:1;padding-left:12px}
.drill-meta{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--text);letter-spacing:.1em}
.drill-sub{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--text-dim);letter-spacing:.08em}
.btn-back{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:.63rem;letter-spacing:.1em;padding:6px 12px;border-radius:3px;cursor:pointer;transition:border-color .15s,color .15s;flex-shrink:0}
.btn-back:hover{border-color:var(--text-dim);color:var(--text)}
.loading-card{display:none;margin:20px 0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:28px 32px;align-items:center;gap:14px}
.loading-card.visible{display:flex}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-dim);letter-spacing:.08em}

/* VERB CARD */
.verb-card{display:none;margin:16px 0 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px 28px;flex-direction:column;align-items:center;text-align:center;gap:0;animation:fadeUp .18s ease}
.verb-card-dict{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,7vw,2.6rem);color:var(--cream);letter-spacing:.06em;line-height:1.2}
.verb-card-furi{font-family:'Noto Serif JP',serif;font-size:.9rem;color:var(--text-dim);margin-top:5px;letter-spacing:.08em}
.verb-card-def{font-family:'DM Sans',sans-serif;font-size:.76rem;color:var(--text-dim);font-style:italic;margin-top:4px;letter-spacing:.02em}
.verb-card-divider{width:40px;height:1px;background:var(--border);margin:14px auto}
.verb-card-cue{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:var(--text);line-height:1.4;max-width:300px}

/* INPUT */
.input-area{display:flex;flex-direction:column;gap:8px}
.preview-row{height:36px;position:relative;display:flex;align-items:center;justify-content:center}
.romaji-preview{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:1.35rem;color:var(--amber);letter-spacing:.08em;transition:opacity .15s;opacity:0;text-align:center}
.romaji-preview.visible{opacity:1}
.correct-answer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;animation:fadeUp .2s ease}
.correct-answer.visible{display:flex}
.correct-answer-kana{font-family:'Noto Serif JP',serif;font-size:1.35rem;color:#e07070;letter-spacing:.06em;text-align:center}
.answer-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:12px 16px;color:var(--cream);font-family:'Noto Serif JP',serif;font-size:1.2rem;outline:none;transition:border-color .15s;letter-spacing:.05em;text-align:center}
.answer-input:focus{border-color:var(--amber-dim)}
.answer-input.correct{border-color:var(--green);background:rgba(74,140,92,.08)}
.answer-input.wrong{border-color:var(--red);background:rgba(184,64,64,.08)}
.submit-btn{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.12em;padding:12px 0;border-radius:5px;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
.submit-btn:hover{background:var(--amber);border-color:var(--amber);color:#0e0c0a}
.submit-btn.btn-next{background:var(--bg3);border-color:var(--border);color:var(--amber)}
.submit-btn.btn-next:hover{background:var(--amber);border-color:var(--amber);color:#0e0c0a}
.feedback{display:none}
.drill-bottom{padding:10px 0 16px;display:flex;flex-direction:column;align-items:center;gap:6px;border-top:1px solid var(--border)}
.drill-progress{display:flex;gap:2px;align-items:center;width:120px}
.progress-pip{flex:1;min-width:4px;max-width:14px;height:2px;border-radius:2px;background:var(--bg3);transition:background .3s}
.progress-pip.correct{background:var(--green)}
.progress-pip.wrong{background:var(--red)}
.drill-remaining{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream);text-align:center}
.drill-remaining-label{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);text-align:center;margin-top:1px}

/* RESULTS */
.results-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:48px 0;gap:16px;text-align:center}
.results-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--text-dim)}
.results-score{font-family:'Playfair Display',serif;font-size:clamp(3.5rem,16vw,5.5rem);color:var(--cream);line-height:1;margin:8px 0}
.results-pct{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;color:var(--amber);letter-spacing:.08em}
.results-verdict{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;margin-top:8px;padding:14px 28px;border-radius:6px;border:1px solid}
.results-verdict.pass{color:var(--green);border-color:rgba(74,140,92,.35);background:rgba(74,140,92,.06)}
.results-verdict.fail{color:#d06060;border-color:rgba(184,64,64,.3);background:rgba(184,64,64,.05)}
.results-btn{margin-top:16px;background:var(--amber);border:none;color:#0e0c0a;font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;padding:13px 40px;border-radius:4px;cursor:pointer;font-weight:500;transition:opacity .15s}
.results-btn:hover{opacity:.85}

/* RESET */
.reset-row{text-align:center;padding:16px 0 32px}
.reset-btn{background:none;border:none;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;text-decoration:underline;transition:color .15s}
.reset-btn:hover{color:var(--red)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:500px){
  .app{padding:0 16px}
  .form-grid{grid-template-columns:1fr 1fr}
  .stats-bar{gap:16px}
  .modal{padding:24px 18px}
  .learn-banner{flex-wrap:wrap}
  .srs-panel-footer{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app">

<header>
  <span class="logo">墨 Sumi</span><span class="logo-sep"></span>
  <span class="logo-sub">Verb Forms</span>
  <div class="header-right">
    <div class="streak"><span id="streakCount">0 day streak</span></div>
  </div>
</header>

<div class="tab-bar" id="mainTabBar">
  <button class="tab-btn active" onclick="switchTab('practice')">Practice</button>
  <button class="tab-btn" onclick="switchTab('reference')">Reference</button>
</div>

<!-- ══ PRACTICE ══ -->
<div class="view active" id="view-practice">

  <div class="home-hero">
    <h1>Conjugate<br>with <em>confidence.</em></h1>
    <div class="home-rule"></div>
  </div>

  <div id="learnSection" style="display:none">
    <div class="section-label">Learn</div>
    <div class="learn-banner" id="learnBanner">
      <div class="learn-banner-icon">📖</div>
      <div class="learn-banner-body">
        <div class="learn-banner-label">New Unlock</div>
        <div class="learn-banner-title" id="bannerTitle"></div>
        <div class="learn-banner-sub">Study this pattern before you drill it.</div>
      </div>
      <button class="learn-banner-btn" onclick="openModal()">Study Now</button>
    </div>
  </div>

  <div id="learningSection">
    <div class="section-divider"></div>
    <div class="section-label">Study</div>
    <div class="form-grid" id="formGrid"></div>
  </div>

  <div id="srsSection" style="display:none">
    <div class="section-divider"></div>
    <div class="section-label">SRS Review</div>
    <div class="srs-panel">
      <div class="srs-chips-row" id="srsChips"></div>
      <div class="srs-panel-footer">
        <div class="srs-panel-info" id="srsPanelInfo"></div>
        <button class="srs-begin-btn" id="srsBeginBtn" onclick="startPhase2()">Begin Review →</button>
      </div>
    </div>
  </div>

  <div style="margin-top:auto;padding-top:20px"></div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Drills</div></div>

<script>
// ════════════════════════════════════════════

const FORMS = [
  {
    id:'te', name:'て-form', jpEx:'食べて・書いて',
    usage:`The て-form is one of the most productive forms in Japanese. It chains sequential actions (食べて寝る — ate and then slept), makes polite requests with ください, forms the progressive 〜ている (is doing / has done), and anchors patterns like 〜てから (after doing), 〜てもいい (may I), 〜てはいけない (must not), and 〜てあげる / くれる / もらう (giving and receiving actions).`,

      { id:'te-ku', name:'う-verbs: く → いて',

      { id:'te-gu', name:'う-verbs: ぐ → いで',

      { id:'te-su', name:'う-verbs: す → して',

  {
    id:'nai', name:'ない-form', jpEx:'食べない・書かない',
    usage:`The ない-form is the plain (casual) negative for present and future actions. It anchors key patterns: 〜ないで (without doing / don't), 〜なければならない (must), 〜ないといけない (have to), and 〜ていない (haven't done yet). In formal speech, ない becomes ません.`,
    groups:[
      { id:'nai-ru', name:'る-verbs',
        body:`<p><strong>Rule:</strong> Drop る and add ない. The stem is identical to て-form.</p>`,

        body:`<p><strong>Rule:</strong> Shift the final kana to the あ-row and add ない: く→かない, ぐ→がない, す→さない, つ→たない, ぬ→なない, ぶ→ばない, む→まない, る→らない.</p>
              <p>Critical exception: verbs ending in う become わない, not あない. The わ is a historical form that only surfaces here.</p>`,

    usage:`たい expresses the speaker's own desire to do something — "I want to ~." It applies only to first-person subjects; use 〜たがっている for third-party desires. Because たい conjugates like an い-adjective, it has a past たかった (wanted to) and can modify nouns: 食べたいもの (things I want to eat). The negative たくない means "I don't want to ~."`,

        examples:[{from:'食べる',to:'食べたい',en:'want to eat'},{from:'飲む',to:'飲みたい',en:'want to drink'},{from:'行く',to:'行きたい',en:'want to go'},{from:'する',to:'したい',en:'want to do'}]},

      { id:'masu-u', name:'う-verbs',

      { id:'masu-irr', name:'Irregular verbs: する・くる',
        body:`<p><strong>Rule:</strong> する → します, くる → きます. All する-compounds follow: 勉強します, 電話します.</p>`,
        examples:[{from:'する',to:'します',en:'do (polite)'},{from:'くる',to:'きます',en:'come (polite)'},{from:'勉強する',to:'勉強します',en:'study (polite)'},{from:'練習する',to:'練習します',en:'practice (polite)'}]},
    ]
  },
  {
    id:'ta', name:'た-form', jpEx:'食べた・書いた',
    usage:`The た-form is the plain past tense — the casual equivalent of ました. It also anchors 〜たことがある (have experienced), 〜たあとで (after doing), 〜たり〜たりする (doing things like X and Y), and 〜たら (conditional: if/when X happened).`,
    groups:[
      { id:'ta-ru', name:'る-verbs',
        body:`<p><strong>Rule:</strong> Drop る and add た. Exactly mirrors て-form: same stem, て → た.</p>`,
        examples:[{from:'食べる',to:'食べた',en:'ate'},{from:'見る',to:'見た',en:'saw'},{from:'起きる',to:'起きた',en:'woke up'},{from:'疲れる',to:'疲れた',en:'got tired'}]},
      { id:'ta-u', name:'う-verbs',
        body:`<p><strong>Rule:</strong> Directly mirrors て-form — replace て with た and voiced で with voiced だ: いて→いた, いで→いだ, して→した, って→った, んで→んだ. The 行く exception carries over: 行く → 行った.</p>`,
        examples:[{from:'書く',to:'書いた',en:'wrote'},{from:'話す',to:'話した',en:'spoke'},{from:'待つ',to:'待った',en:'waited'},{from:'飲む',to:'飲んだ',en:'drank'},{from:'帰る ⚠',to:'帰った',en:'went home (godan!)'}]},
      { id:'ta-irr', name:'Irregular verbs: する・くる',
        body:`<p><strong>Rule:</strong> する → した, くる → きた. Mirrors て-form stems directly: して→した, きて→きた. Compounds follow: 勉強した, 電話した.</p>`,
        examples:[{from:'する',to:'した',en:'did'},{from:'くる',to:'きた',en:'came'},{from:'勉強する',to:'勉強した',en:'studied'},{from:'電話する',to:'電話した',en:'called'}]},
    ]
  },
  {
    id:'potential', name:'Potential form', jpEx:'食べられる・書ける',

      { id:'pot-u', name:'う-verbs',
        body:`<p><strong>Rule:</strong> Shift the final kana to the え-row and add る: く→ける, ぐ→げる, す→せる, つ→てる, う→える, る→れる, ぬ→ねる, ぶ→べる, む→める. The result is always an ichidan verb.</p>`,
        examples:[{from:'書く',to:'書ける',en:'can write'},{from:'泳ぐ',to:'泳げる',en:'can swim'},{from:'話す',to:'話せる',en:'can speak'},{from:'飲む',to:'飲める',en:'can drink'},{from:'帰る ⚠',to:'帰れる',en:'can go home (godan!)'}]},
      { id:'pot-irr', name:'Irregular verbs: する・くる',
        body:`<p><strong>Rule:</strong> する → できる (a completely different word — must be memorized). All する-compounds use できる: 勉強できる, 電話できる. くる → こられる.</p>`,
        examples:[{from:'する',to:'できる',en:'can do (special!)'},{from:'くる',to:'こられる',en:'can come'},{from:'勉強する',to:'勉強できる',en:'can study'},{from:'料理する',to:'料理できる',en:'can cook'}]},

// ════════════════════════════════════════════
// SRS CONSTANTS
// ════════════════════════════════════════════
const CD = {
  FAIL:    1   * 3600000,   // 1h
  PASS1:   4   * 3600000,   // 4h (first pass / new subgroup)
  FINAL_GATE: 12 * 3600000, // 12h before final
  P2_MIN:  4   * 3600000,   // min 4h between phase2 sessions
};

const SRS_CD = [
  4   * 3600000,   // 0:  4h
  86400000,        // 1:  1d
  129600000,       // 2:  1.5d
  172800000,       // 3:  2d
  172800000,       // 4:  2d
  259200000,       // 5:  3d
  259200000,       // 6:  3d
  345600000,       // 7:  4d
  432000000,       // 8:  5d
  518400000,       // 9:  6d
  604800000,       // 10: 1w
];

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
const LS = k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
const SS = (k, v) => localStorage.setItem(k, JSON.stringify(v));

// formStates: { [formId]: { phase, unlockedGroupIds, consecutivePasses, cooldownUntil,
//   allGroupsUnlocked, finalCooldownUntil, srsLevel, srsCooldownUntil } }
let formStates  = LS('sv-fs')  || {};
let readCards   = LS('sv-rc')  || [];
let globalSt    = LS('sv-gl')  || { p2CooldownUntil: 0, p2LastExcludedId: null };
let stats       = LS('sv-st')  || { total: 0, today: 0, lastDate: '' };
let savedSess   = LS('sv-ss')  || null;

function saveAll() {
  SS('sv-fs', formStates); SS('sv-rc', readCards);
  SS('sv-gl', globalSt);   SS('sv-st', stats);
}

// ════════════════════════════════════════════
// FORM STATE HELPERS
// ════════════════════════════════════════════
function initFirstForm() {
  if (!formStates[FORMS[0].id]) {
    formStates[FORMS[0].id] = makeFormState(FORMS[0]);
    saveAll();
  }
}

function makeFormState(form) {
  return {
    phase: 'learning',
    unlockedGroupIds: [form.groups[0].id],
    consecutivePasses: 0,
    cooldownUntil: 0,
    allGroupsUnlocked: form.groups.length === 1,
    finalCooldownUntil: 0,
    srsLevel: 0,
    srsCooldownUntil: 0,
  };
}

function getState(formId) { return formStates[formId]; }

function hasUnreadCard(formId) {
  const state = getState(formId);
  if (!state) return false;
  const form = FORMS.find(f => f.id === formId);
  return form.groups.some(g => state.unlockedGroupIds.includes(g.id) && !readCards.includes(g.id));
}

function isFormDrillable(formId) {
  const state = getState(formId);
  if (!state || state.phase !== 'learning') return false;
  if (hasUnreadCard(formId)) return false;
  if (Date.now() < state.cooldownUntil) return false;
  // Don't allow regular drilling if final is already cooling (but do allow it — they can keep practicing)
  return true;
}

function isFinalReady(formId) {
  const state = getState(formId);
  if (!state || state.phase !== 'learning') return false;
  if (!state.allGroupsUnlocked || !state.finalCooldownUntil) return false;
  return Date.now() >= state.finalCooldownUntil;
}

// ════════════════════════════════════════════
// SESSION COMPLETION HANDLERS
// ════════════════════════════════════════════
function handlePhase1Complete(formId, correct) {
  const state = getState(formId);
  const form  = FORMS.find(f => f.id === formId);
  const passed = correct >= 9;
  const now    = Date.now();

  if (!passed) {
    state.consecutivePasses = 0;
    state.cooldownUntil     = now + CD.FAIL;
  } else {
    state.consecutivePasses++;
    state.cooldownUntil = now + CD.PASS1;

    if (state.consecutivePasses >= 2) {
      state.consecutivePasses = 0;

      if (!state.allGroupsUnlocked) {
        // Unlock next subgroup
        const nextIdx = state.unlockedGroupIds.length;
        if (nextIdx < form.groups.length) {
          state.unlockedGroupIds.push(form.groups[nextIdx].id);
          if (state.unlockedGroupIds.length === form.groups.length) {
            state.allGroupsUnlocked = true;
          }
        }
        // cooldownUntil already set to 4h above — new subgroup available after 4h
      } else {
        // All groups unlocked — trigger 12h final gate (only once)
        if (!state.finalCooldownUntil) {
          state.finalCooldownUntil = now + CD.FINAL_GATE;
        }
      }
    }
  }

  stats.total++;
  tickToday();
  saveAll();
}

function handleFinalComplete(formId, correct, total) {
  const state       = getState(formId);
  const passNeeded  = Math.ceil(total * 0.85);
  const passed      = correct >= passNeeded;
  const now         = Date.now();

  if (passed) {
    state.phase            = 'srs';
    state.srsLevel         = 0;
    state.srsCooldownUntil = now + SRS_CD[0];
    state.finalCooldownUntil = 0;

    // Unlock next form
    const idx = FORMS.findIndex(f => f.id === formId);
    if (idx < FORMS.length - 1) {
      const nf = FORMS[idx + 1];
      if (!formStates[nf.id]) {
        formStates[nf.id] = makeFormState(nf);
      }
    }
  } else {
    // Failed: reset consecutive + final gate so they must earn 2 in a row again
    state.consecutivePasses  = 0;
    state.finalCooldownUntil = 0;
    state.cooldownUntil      = now + CD.FAIL;
  }

  stats.total++;
  tickToday();
  saveAll();
}

function handlePhase2Complete(scores) {
  // scores: { formId: { correct, total } }
  const now = Date.now();

  for (const [formId, sc] of Object.entries(scores)) {
    const state = getState(formId);
    if (!state || state.phase !== 'srs') continue;

    const { correct, total } = sc;
    let delta = 0;

    if (total === 10) {
      if (correct >= 9)      delta =  1;
      else if (correct >= 7) delta = -1;
      else                   delta = -2;
    } else if (total === 7) {
      if (correct >= 6)      delta =  1;
      else if (correct >= 5) delta = -1;
      else                   delta = -2;
    } else { // 6
      if (correct === 6)     delta =  1;
      else if (correct === 5)delta = -1;
      else                   delta = -2;
    }

    const newLevel         = Math.max(0, Math.min(10, state.srsLevel + delta));
    state.srsLevel         = newLevel;
    state.srsCooldownUntil = now + SRS_CD[newLevel];
  }

  globalSt.p2CooldownUntil = now + CD.P2_MIN;
  stats.total++;
  tickToday();
  saveAll();
}

function tickToday() {
  const today = new Date().toDateString();
  if (stats.lastDate !== today) { stats.today = 0; stats.lastDate = today; }
  stats.today++;
}

// ════════════════════════════════════════════
// PHASE 2 SESSION BUILDER
// ════════════════════════════════════════════
function getSRSForms() {
  return FORMS.filter(f => getState(f.id)?.phase === 'srs');
}

function getDueSRSForms() {
  const now = Date.now();
  return getSRSForms().filter(f => now >= (getState(f.id)?.srsCooldownUntil || 0));
}

function isPhase2Ready() {
  return Date.now() >= globalSt.p2CooldownUntil && getDueSRSForms().length > 0;
}

function buildPhase2Queue() {
  let due = getDueSRSForms();
  if (!due.length) return null;

  let formsToUse = due;
  if (due.length > 5) {
    // Rotate exclusion: exclude one that isn't the last excluded
    const candidates = due.filter(f => f.id !== globalSt.p2LastExcludedId);
    const toExclude  = candidates[candidates.length - 1];
    formsToUse = due.filter(f => f.id !== toExclude.id).slice(0, 5);
    globalSt.p2LastExcludedId = toExclude.id;
  }

  const qpf = formsToUse.length <= 3 ? 10 : formsToUse.length === 4 ? 7 : 6;

  const queue = [];
  for (const form of formsToUse)
    for (let i = 0; i < qpf; i++)
      queue.push({ formId: form.id, form });

  // Fisher-Yates shuffle
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }

  return { queue, qpf, formsUsed: formsToUse };
}

// ════════════════════════════════════════════
// START DRILLS
// ════════════════════════════════════════════
function startPhase1(formId) {
  const form = FORMS.find(f => f.id === formId);
  D.type = 'phase1'; D.formId = formId; D.form = form;
  D.correct = 0; D.wrong = 0; D.index = 0; D.total = 10; D.usedVerbs = []; D.results = []; D.questionQueue = [];
  D.queue = []; D.p2Scores = {};

  // Resume partial session
  if (savedSess?.type === 'phase1' && savedSess?.formId === formId && savedSess.index < 10) {
    D.correct  = savedSess.correct;
    D.wrong    = savedSess.wrong;
    D.index    = savedSess.index;
    D.results  = savedSess.results || [];
    D.questionQueue = savedSess.questionQueue || [];
  }
  savedSess = null; SS('sv-ss', null);

  // Build full session queue if not resumed
  if (D.questionQueue.length === 0) {
    D.questionQueue = buildSessionQueue(form, D.total);
  }

  document.getElementById('drillLabel').textContent = form.name;
  document.getElementById('drillSub').textContent   = 'Learning';
  initDrillView(D.total, D.index);
  displayQuestion();
}

function startFinal(formId) {
  const form  = FORMS.find(f => f.id === formId);
  const total = Math.max(20, form.groups.length * 4);
  D.type = 'final'; D.formId = formId; D.form = form;
  D.correct = 0; D.wrong = 0; D.index = 0; D.total = total; D.usedVerbs = []; D.results = []; D.questionQueue = [];
  D.queue = []; D.p2Scores = {};

  D.questionQueue = buildSessionQueue(form, total);

  document.getElementById('drillLabel').textContent = form.name;
  document.getElementById('drillSub').textContent   = 'Final Review — ' + total + ' questions';
  initDrillView(D.total, 0);
  displayQuestion();
}

function startPhase2() {
  const config = buildPhase2SessionQueue();
  if (!config) return;

  D.type = 'phase2'; D.formId = null; D.form = null;
  D.correct = 0; D.wrong = 0; D.index = 0; D.total = config.queue.length; D.usedVerbs = []; D.results = []; D.questionQueue = config.queue;
  D.queue = []; D.p2Scores = {};

  // Init per-form score trackers
  for (const item of config.queue) {
    const fid = item.p2formId;
    if (!D.p2Scores[fid]) D.p2Scores[fid] = { correct: 0, total: 0 };
    D.p2Scores[fid].total++;
  }

  document.getElementById('drillLabel').textContent = 'Mixed Review';
  document.getElementById('drillSub').textContent   = config.formsUsed.map(f => f.name).join(' · ');
  initDrillView(D.total, 0);
  displayQuestion();
}

function initDrillView(total, startIndex) {
  const pc = document.getElementById('drillProgress');
  pc.innerHTML = '';
  // Scale container: 6px per pip + 2px gap, capped at full width
  pc.style.width = Math.min(total * 8, 200) + 'px';
  for (let i = 0; i < total; i++) {
    const pip = document.createElement('div');
    pip.className = 'progress-pip';
    if (D.results[i]) pip.classList.add(D.results[i]);
    pc.appendChild(pip);
  }

  document.getElementById('drillRemaining').textContent = D.total - D.index;
  showDrillView();
}

// ════════════════════════════════════════════
// HIRAGANA → ROMAJI (no library needed)
// ════════════════════════════════════════════
function toRomaji(str) {
  const T = {
    'あ':'a','い':'i','う':'u','え':'e','お':'o',
    'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
    'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
    'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
    'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
    'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
    'だ':'da','づ':'zu','で':'de','ど':'do',
    'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
    'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
    'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
    'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
    'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
    'や':'ya','ゆ':'yu','よ':'yo',
    'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
    'わ':'wa','を':'wo','ん':'n',
    'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
    'しゃ':'sha','しゅ':'shu','しょ':'sho',
    'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
    'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
    'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
    'みゃ':'mya','みゅ':'myu','みょ':'myo',
    'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
    'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
    'じゃ':'ja','じゅ':'ju','じょ':'jo',
    'びゃ':'bya','びゅ':'byu','びょ':'byo',
    'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
  };
  let r = '', i = 0;
  while (i < str.length) {
    if (str[i] === 'っ') {
      const nxt = T[str[i+1]+str[i+2]] || T[str[i+1]] || '';
      r += nxt[0] || ''; i++; continue;
    }
    const two = str[i]+str[i+1];
    if (T[two]) { r += T[two]; i += 2; }
    else if (T[str[i]]) { r += T[str[i]]; i++; }
    else { r += str[i]; i++; }
  }
  return r;
}

// ════════════════════════════════════════════
// ROMAJI → HIRAGANA (live preview)
// ════════════════════════════════════════════
function romajiToHiragana(str) {
  str = str.toLowerCase();
  // Longest-match map (3-char entries checked before 2-char, 2-char before 1-char)
  const MAP = [
    ['sha','しゃ'],['shi','し'],['shu','しゅ'],['sho','しょ'],
    ['chi','ち'],  ['cha','ちゃ'],['chu','ちゅ'],['cho','ちょ'],
    ['tsu','つ'],
    ['kya','きゃ'],['kyu','きゅ'],['kyo','きょ'],
    ['gya','ぎゃ'],['gyu','ぎゅ'],['gyo','ぎょ'],
    ['nya','にゃ'],['nyu','にゅ'],['nyo','にょ'],
    ['hya','ひゃ'],['hyu','ひゅ'],['hyo','ひょ'],
    ['mya','みゃ'],['myu','みゅ'],['myo','みょ'],
    ['rya','りゃ'],['ryu','りゅ'],['ryo','りょ'],
    ['bya','びゃ'],['byu','びゅ'],['byo','びょ'],
    ['ja','じゃ'], ['ji','じ'],  ['ju','じゅ'], ['jo','じょ'],
    ['ka','か'],['ki','き'],['ku','く'],['ke','け'],['ko','こ'],
    ['ga','が'],['gi','ぎ'],['gu','ぐ'],['ge','げ'],['go','ご'],
    ['sa','さ'],['su','す'],['se','せ'],['so','そ'],
    ['za','ざ'],['zu','ず'],['ze','ぜ'],['zo','ぞ'],
    ['ta','た'],['te','て'],['to','と'],
    ['da','だ'],['de','で'],['do','ど'],
    ['na','な'],['ni','に'],['nu','ぬ'],['ne','ね'],['no','の'],
    ['ha','は'],['hi','ひ'],['fu','ふ'],['he','へ'],['ho','ほ'],
    ['ba','ば'],['bi','び'],['bu','ぶ'],['be','べ'],['bo','ぼ'],
    ['pa','ぱ'],['pi','ぴ'],['pu','ぷ'],['pe','ぺ'],['po','ぽ'],
    ['ma','ま'],['mi','み'],['mu','む'],['me','め'],['mo','も'],
    ['ya','や'],['yu','ゆ'],['yo','よ'],
    ['ra','ら'],['ri','り'],['ru','る'],['re','れ'],['ro','ろ'],
    ['wa','わ'],['wo','を'],
    ['a','あ'],['i','い'],['u','う'],['e','え'],['o','お'],
  ];
  let result = '', i = 0;
  while (i < str.length) {
    const c = str[i];
    // double consonant → っ (but not 'nn' — handle n separately)
    if (c !== 'n' && c === str[i+1] && !'aiueo'.includes(c)) {
      result += 'っ'; i++; continue;
    }
    // n: convert to ん if followed by a consonant, another n, or end of string
    if (c === 'n') {
      const next = str[i+1];
      if (!next || (next !== 'y' && !'aiueo'.includes(next))) {
        result += 'ん'; i++; continue;
      }
    }
    // greedy longest match
    let matched = false;
    for (const [rom, hira] of MAP) {
      if (str.startsWith(rom, i)) {
        result += hira; i += rom.length; matched = true; break;
      }
    }
    if (!matched) { result += c; i++; }
  }
  return result;
}

// ════════════════════════════════════════════
// CONJUGATION ENGINE
// ════════════════════════════════════════════
// verb.type: 'ichidan' | 'godan' | 'suru' | 'kuru' | 'suru-cpd'
// For godan, last kana of furi determines the pattern

const A_ROW  = {'く':'か','ぐ':'が','す':'さ','つ':'た','う':'わ','る':'ら','ぬ':'な','ぶ':'ば','む':'ま'};
const I_ROW  = {'く':'き','ぐ':'ぎ','す':'し','つ':'ち','う':'い','る':'り','ぬ':'に','ぶ':'び','む':'み'};
const E_ROW  = {'く':'け','ぐ':'げ','す':'せ','つ':'て','う':'え','る':'れ','ぬ':'ね','ぶ':'べ','む':'め'};
const O_ROW  = {'く':'こ','ぐ':'ご','す':'そ','つ':'と','う':'お','る':'ろ','ぬ':'の','ぶ':'ぼ','む':'も'};
const TE_SFX = {'く':'いて','ぐ':'いで','す':'して','つ':'って','う':'って','る':'って','ぬ':'んで','ぶ':'んで','む':'んで'};
const TA_SFX = {'く':'いた','ぐ':'いだ','す':'した','つ':'った','う':'った','る':'った','ぬ':'んだ','ぶ':'んだ','む':'んだ'};

function conjugate(verb, formId) {
  const f    = verb.furi;
  const end  = f.slice(-1);
  const stem = f.slice(0, -1);
  const base = f.slice(0, -2); // for suru-cpd: drops する

  if (verb.type === 'suru') {
    if (formId === 'te')         return 'して';
    if (formId === 'nai')        return 'しない';
    if (formId === 'tai')        return 'したい';
    if (formId === 'taineg')     return 'したくない';
    if (formId === 'masu')       return 'します';
    if (formId === 'ta')         return 'した';
    if (formId === 'potential')  return 'できる';
    if (formId === 'volitional') return 'しよう';
  }
  if (verb.type === 'kuru') {
    if (formId === 'te')         return 'きて';
    if (formId === 'nai')        return 'こない';
    if (formId === 'tai')        return 'きたい';
    if (formId === 'taineg')     return 'きたくない';
    if (formId === 'masu')       return 'きます';
    if (formId === 'ta')         return 'きた';
    if (formId === 'potential')  return 'こられる';
    if (formId === 'volitional') return 'こよう';
  }
  if (verb.type === 'suru-cpd') {
    if (formId === 'te')         return base + 'して';
    if (formId === 'nai')        return base + 'しない';
    if (formId === 'tai')        return base + 'したい';
    if (formId === 'taineg')     return base + 'したくない';
    if (formId === 'masu')       return base + 'します';
    if (formId === 'ta')         return base + 'した';
    if (formId === 'potential')  return base + 'できる';
    if (formId === 'volitional') return base + 'しよう';
  }
  if (verb.type === 'ichidan') {
    if (formId === 'te')         return stem + 'て';
    if (formId === 'nai')        return stem + 'ない';
    if (formId === 'tai')        return stem + 'たい';
    if (formId === 'taineg')     return stem + 'たくない';
    if (formId === 'masu')       return stem + 'ます';
    if (formId === 'ta')         return stem + 'た';
    if (formId === 'potential')  return stem + 'られる';
    if (formId === 'volitional') return stem + 'よう';
  }
  // godan
  if (formId === 'te') {
    if (f === 'いく') return 'いって'; // exception
    return stem + TE_SFX[end];
  }
  if (formId === 'ta') {
    if (f === 'いく') return 'いった'; // exception (mirrors て)
    return stem + TA_SFX[end];
  }
  if (formId === 'nai')        return stem + A_ROW[end] + 'ない';
  if (formId === 'tai')        return stem + I_ROW[end] + 'たい';
  if (formId === 'taineg')     return stem + I_ROW[end] + 'たくない';
  if (formId === 'masu')       return stem + I_ROW[end] + 'ます';
  if (formId === 'potential')  return stem + E_ROW[end] + 'る';
  if (formId === 'volitional') return stem + O_ROW[end] + 'う';
  return '?';
}

  {dict:'呼ぶ',    furi:'よぶ',       type:'godan', en:'to call / invite'},
  {dict:'運ぶ',    furi:'はこぶ',     type:'godan', en:'to carry / transport'},
  {dict:'選ぶ',    furi:'えらぶ',     type:'godan', en:'to choose / select'},
  // ── GODAN ぬ ──
  {dict:'死ぬ',    furi:'しぬ',       type:'godan', en:'to die'},
  // ── IRREGULAR ──
  {dict:'する',      furi:'する',         type:'suru',     en:'to do'},
  {dict:'くる',      furi:'くる',         type:'kuru',     en:'to come'},
  {dict:'勉強する',  furi:'べんきょうする', type:'suru-cpd', en:'to study'},
  {dict:'運動する',  furi:'うんどうする',   type:'suru-cpd', en:'to exercise'},
  {dict:'料理する',  furi:'りょうりする',   type:'suru-cpd', en:'to cook'},
  {dict:'電話する',  furi:'でんわする',     type:'suru-cpd', en:'to phone / call'},
  {dict:'掃除する',  furi:'そうじする',     type:'suru-cpd', en:'to clean'},
  {dict:'練習する',  furi:'れんしゅうする', type:'suru-cpd', en:'to practice'},
];

// Which VERBS belong to which subgroup (for Stage 1 question selection)
function getVerbsForGroup(groupId) {
  const godan   = v => v.type === 'godan';
  const ichidan = v => v.type === 'ichidan';
  const irr     = v => ['suru','kuru','suru-cpd'].includes(v.type);
  switch(groupId) {
    // all ichidan groups across all forms
    case 'te-ru': case 'nai-ru': case 'masu-ru':
    case 'ta-ru': case 'pot-ru': case 'vol-ru':
      return VERBS.filter(ichidan);
    // て-form uses fine-grained godan pools (first-time learning)
    case 'te-ku':
      return VERBS.filter(v => godan(v) && v.furi.endsWith('く'));
    case 'te-gu':
      return VERBS.filter(v => godan(v) && v.furi.endsWith('ぐ'));
    case 'te-su':
      return VERBS.filter(v => godan(v) && v.furi.endsWith('す'));
    case 'te-tsu':
      return VERBS.filter(v => godan(v) && ['つ','う','る'].includes(v.furi.slice(-1)));
    case 'te-mu':
      return VERBS.filter(v => godan(v) && ['ぬ','ぶ','む'].includes(v.furi.slice(-1)));
    // all irregular groups across all forms
    case 'te-irr':  case 'nai-irr': case 'masu-irr':
    case 'ta-irr':  case 'pot-irr': case 'vol-irr':
      return VERBS.filter(irr);
    // later forms use all-godan pool (student already knows the sub-patterns)
    case 'nai-u': case 'masu-u': case 'ta-u':
    case 'pot-u': case 'vol-u':
      return VERBS.filter(godan);
    // たい applies to all verb types
    case 'tai-all': case 'tai-neg':
      return VERBS;
    default:
      return VERBS;
  }
}

// Which internal formId to pass to conjugate() for a given subgroup
function formIdForGroup(groupId) {
  if (groupId.startsWith('te-'))        return 'te';
  if (groupId.startsWith('nai-'))       return 'nai';
  if (groupId === 'tai-all')            return 'tai';
  if (groupId === 'tai-neg')            return 'taineg';
  if (groupId.startsWith('masu-'))      return 'masu';
  if (groupId.startsWith('ta-'))        return 'ta';
  if (groupId.startsWith('pot-'))       return 'potential';
  if (groupId.startsWith('vol-'))       return 'volitional';
  return 'te';
}

// Stage 1: show the form name explicitly as the cue
const GROUP_LABEL = {
  'te-ru':'て-form',   'te-ku':'て-form',    'te-gu':'て-form',
  'te-su':'て-form',   'te-tsu':'て-form',   'te-mu':'て-form',  'te-irr':'て-form',
  'nai-ru':'ない-form','nai-u':'ない-form',  'nai-irr':'ない-form',
  'tai-all':'たい-form','tai-neg':'たくない-form',
  'masu-ru':'ます-form','masu-u':'ます-form', 'masu-irr':'ます-form',
  'ta-ru':'た-form',   'ta-u':'た-form',     'ta-irr':'た-form',
  'pot-ru':'Potential','pot-u':'Potential',  'pot-irr':'Potential',
  'vol-ru':'Volitional','vol-u':'Volitional','vol-irr':'Volitional',
};

// Stage 2 (SRS): contextual hint only — no form name given
const FORM_HINT = {
  'te':         'Conjugate to connect actions or make a request',
  'nai':        'Conjugate to say you don\'t / won\'t do this',
  'tai':        'Conjugate to say you want to do this',
  'taineg':     'Conjugate to say you don\'t want to do this',
  'masu':       'Conjugate to the polite present / future',
  'ta':         'Conjugate to the plain past',
  'potential':  'Conjugate to express ability (can do)',
  'volitional': 'Conjugate to suggest or express intention (let\'s / I\'ll)',
};

function displayQuestion() {
  const item = D.questionQueue[D.index];
  if (!item) return;

  D.answer       = item.kana;
  D.answerKana   = item.kana;
  D.answerRomaji = toRomaji(item.kana);

  document.getElementById('vcDict').textContent = item.verb.dict;
  document.getElementById('vcFuri').textContent = item.verb.furi;
  document.getElementById('vcDef').textContent  = item.verb.en || '';
  document.getElementById('vcCue').textContent  = item.cue;

  const vc = document.getElementById('verbCard');
  const ia = document.getElementById('inputArea');
  vc.style.display = 'flex';
  ia.style.display = 'flex';

  const inp = document.getElementById('answerInput');
  inp.value = ''; inp.className = 'answer-input';
  // On mobile, scroll the verb card to the top of the viewport when keyboard opens
  inp.onfocus = () => {
    setTimeout(() => {
      document.getElementById('verbCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  };
  inp.focus();
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('correctAnswer').className = 'correct-answer';
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Check'; btn.classList.remove('btn-next');
  const preview = document.getElementById('romajiPreview');
  preview.textContent = ''; preview.className = 'romaji-preview';
  D.answered = false;
  inp.oninput = () => {
    if (D.answered) return;
    const raw = inp.value;
    if (!raw) { preview.textContent=''; preview.className='romaji-preview'; return; }
    const hira = romajiToHiragana(raw);
    preview.textContent = hira;
    preview.className = hira !== raw ? 'romaji-preview visible' : 'romaji-preview';
  };
  inp.onkeydown = e => { if (e.key === 'Enter') checkAnswer(); };
}

// Build question queue for a phase1/final session
function buildSessionQueue(form, count) {
  const st = getState(form.id);
  const groups = st ? form.groups.filter(g => st.unlockedGroupIds.includes(g.id)) : [form.groups[0]];
  const used = new Set();
  const queue = [];

  for (let i = 0; i < count; i++) {
    // 50% weight to newest group
    const group = (groups.length > 1 && Math.random() < 0.5)
      ? groups[groups.length - 1]
      : groups[Math.floor(Math.random() * groups.length)];

    const pool   = getVerbsForGroup(group.id);
    const unused = pool.filter(v => !used.has(v.furi));
    const verb   = (unused.length ? unused : pool)[Math.floor(Math.random() * (unused.length || pool.length))];
    used.add(verb.furi);

    const conj = formIdForGroup(group.id);
    const kana = conjugate(verb, conj);
    const cue  = GROUP_LABEL[group.id] || 'Conjugate';
    queue.push({ verb, kana, cue });
  }
  return queue;
}

// Build queue for phase2 session (context hints, mixed forms)
function buildPhase2SessionQueue() {
  const config = buildPhase2Queue(); // existing logic for which forms/how many questions
  if (!config) return null;

  const used = new Set();
  const queue = [];

  for (const qi of config.queue) {
    const f   = qi.form;
    const st  = getState(f.id);
    const grp = st ? f.groups.filter(g => st.unlockedGroupIds.includes(g.id)) : [f.groups[0]];
    const group = grp[Math.floor(Math.random() * grp.length)];
    const conj  = formIdForGroup(group.id);

    const pool   = getVerbsForGroup(group.id);
    const unused = pool.filter(v => !used.has(v.furi));
    const verb   = (unused.length ? unused : pool)[Math.floor(Math.random() * (unused.length || pool.length))];
    used.add(verb.furi);

    const kana = conjugate(verb, conj);
    const cue  = FORM_HINT[conj] || 'Conjugate';
    queue.push({ verb, kana, cue, formId: f.id, p2formId: qi.form.id });
  }
  return { queue, formsUsed: config.formsUsed };
}

// CHECK / NEXT
// ════════════════════════════════════════════
function handleActionBtn() {
  if (!D.answered) checkAnswer();
  else nextQuestion();
}

function checkAnswer() {
  const inp    = document.getElementById('answerInput');
  const btn    = document.getElementById('submitBtn');
  const ca     = document.getElementById('correctAnswer');
  const caKana = document.getElementById('correctAnswerKana');
  const prev   = document.getElementById('romajiPreview');
  const rawAns = inp.value.trim();
  if (!rawAns) return;

  D.answered = true;

  const ci = D.index;
  const normalizedInput = rawAns.toLowerCase().replace(/[^a-z\u3040-\u309f\u30a0-\u30ff\u4e00-\u9fff]/g, '');

  const correct =
    (D.answerRomaji && normalizedInput === D.answerRomaji) ||
    rawAns === D.answer ||
    rawAns === D.answerKana;

  if (correct) {
    inp.classList.add('correct');
    ca.className = 'correct-answer';
    D.correct++;
    if (D.type === 'phase2') {
      const fid = D.questionQueue[ci]?.p2formId;
      if (fid && D.p2Scores[fid]) D.p2Scores[fid].correct++;
    }
  } else {
    inp.classList.add('wrong');
    // Show correct answer in place of romaji preview
    prev.className = 'romaji-preview';
    caKana.textContent = D.answer;
    ca.className = 'correct-answer visible';
    D.wrong++;
  }

  D.index++;
  D.results.push(correct ? 'correct' : 'wrong');
  const pips = document.querySelectorAll('.progress-pip');
  if (pips[ci]) pips[ci].classList.add(correct ? 'correct' : 'wrong');

  document.getElementById('drillRemaining').textContent = D.total - D.index;

  // Morph Check → Next
  btn.textContent = D.index >= D.total ? 'Finish →' : 'Next →';
  btn.classList.add('btn-next');
  inp.oninput   = null;
  inp.onkeydown = e => { if (e.key === 'Enter') handleActionBtn(); };
}

function nextQuestion() {
  if (D.index >= D.total) {
    endSession();
    return;
  }
  displayQuestion();
}

function endSession() {
  // Compute result data before state mutation
  const resultData = {
    correct: D.correct,
    total:   D.total,
    type:    D.type,
    formId:  D.formId,
  };

  if (D.type === 'phase1')      handlePhase1Complete(D.formId, D.correct);
  else if (D.type === 'final')  handleFinalComplete(D.formId, D.correct, D.total);
  else if (D.type === 'phase2') handlePhase2Complete(D.p2Scores);

  SS('sv-ss', null);
  showResults(resultData);
}

function showResults(data) {
  const pct     = Math.round((data.correct / data.total) * 100);
  const passed  = pct >= 85;

  document.getElementById('resultsEyebrow').textContent = 'Session Complete';
  document.getElementById('resultsScore').textContent   = `${data.correct}/${data.total}`;
  document.getElementById('resultsPct').textContent     = `${pct}%`;

  const verdict = document.getElementById('resultsVerdict');
  if (data.type === 'phase1') {
    verdict.textContent = pct >= 90 ? 'Great work — keep drilling to unlock the next group.' : 'Keep going — one more pass unlocks the next group.';
    verdict.className = 'results-verdict ' + (pct >= 90 ? 'pass' : 'fail');
  } else if (data.type === 'final') {
    verdict.textContent = passed ? '★ Moved to SRS — next form unlocked!' : 'Not quite — review again and try the final when ready.';
    verdict.className = 'results-verdict ' + (passed ? 'pass' : 'fail');
  } else {
    verdict.textContent = passed ? 'SRS level up — great retention!' : 'SRS level held — keep reviewing.';
    verdict.className = 'results-verdict ' + (passed ? 'pass' : 'fail');
  }

  ['view-practice','view-reference','view-drill'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  document.getElementById('view-results').classList.add('active');
  document.getElementById('mainTabBar').style.display = 'none';
}

function exitResults() {
  document.getElementById('view-results').classList.remove('active');
  document.getElementById('mainTabBar').style.display = '';
  switchTab('practice');
  updateHomeStats();
}

function getPendingCard() {
  const now = Date.now();
  for (const f of FORMS)
    for (const g of f.groups) {
      const st = formStates[f.id];
      if (!st) continue;
      if (!st.unlockedGroupIds.includes(g.id)) continue;
      if (readCards.includes(g.id)) continue;
      // Don't show banner until the cooldown on this form has passed
      if (now < (st.cooldownUntil || 0)) continue;
      return { form: f, group: g };
    }
  return null;
}

function updateBanner() {
  const p = getPendingCard();
  const learnSection = document.getElementById('learnSection');
  if (p) {
    document.getElementById('bannerTitle').textContent = `${p.form.name} — ${p.group.name}`;
    learnSection.style.display = 'block';
  } else {
    learnSection.style.display = 'none';
  }
}

let modalGroupId = null;

function openModal(groupId) {
  let target;
  if (groupId) {
    for (const f of FORMS) { const g = f.groups.find(g => g.id === groupId); if(g){target={form:f,group:g};break;} }
  } else {

  document.getElementById('modalTitle').textContent    = target.form.name;

function confirmCard() {

    readCards.push(modalGroupId);

function fmtCd(ms) {
  if (ms <= 0) return 'Ready';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function renderPracticeTab() {
  updateBanner();
  renderSRSSection();
  renderFormGrid();
  updateHomeStats();
}

function renderSRSSection() {
  const srsForms = getSRSForms();
  const sec      = document.getElementById('srsSection');
  if (!srsForms.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  const now    = Date.now();
  const due    = getDueSRSForms();
  const ready  = isPhase2Ready();
  const chips  = document.getElementById('srsChips');
  chips.innerHTML = '';

  for (const f of srsForms) {
    const st   = getState(f.id);
    const isDue = now >= (st.srsCooldownUntil || 0);
    chips.innerHTML += `<div class="srs-chip">
      <span class="srs-chip-name">${f.name}</span>
      <span class="srs-chip-level">Lv ${st.srsLevel}</span>
      <span class="srs-chip-tag ${isDue?'due':'waiting'}">${isDue ? '● due' : fmtCd((st.srsCooldownUntil||0)-now)}</span>
    </div>`;
  }

  const info = document.getElementById('srsPanelInfo');
  const btn  = document.getElementById('srsBeginBtn');

  if (ready) {
    info.textContent = `${due.length} form${due.length>1?'s':''} due · ${due.length<=3?due.length*10:due.length===4?28:30} questions`;
    btn.disabled = false;
  } else if (srsForms.length > 0 && !due.length) {
    const nextDue = Math.min(...srsForms.map(f => getState(f.id).srsCooldownUntil||0));
    const p2cd   = globalSt.p2CooldownUntil || 0;
    const waitMs = Math.max(nextDue, p2cd) - now;
    info.textContent = `Next review in ${fmtCd(waitMs)}`;
    btn.disabled = true;
  } else {
    info.textContent = `Global cooldown: ${fmtCd((globalSt.p2CooldownUntil||0) - now)}`;
    btn.disabled = true;
  }
}

function renderFormGrid() {
  const grid    = document.getElementById('formGrid');
  const section = document.getElementById('learningSection');
  grid.innerHTML = '';

  const now    = Date.now();
  const lForms = FORMS.filter(f => getState(f.id)?.phase === 'learning');

  if (!lForms.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  for (const form of lForms) {
    const state     = getState(form.id);
    const unread    = hasUnreadCard(form.id);
    const cdLeft    = (state.cooldownUntil || 0) - now;
    const finalReady = isFinalReady(form.id);
    const finalCooling = state.allGroupsUnlocked && state.finalCooldownUntil && now < state.finalCooldownUntil;

    let cardClass = 'form-card', badgeHTML = '', statusHTML = '';

    if (unread) {
      cardClass += ' state-unread';
      badgeHTML  = `<span class="form-card-badge badge-unread">Lesson</span>`;
      statusHTML = `<div class="form-card-status s-unread">Study lesson first</div>`;
    } else if (finalReady) {
      cardClass += ' state-final-ready';
      badgeHTML  = `<span class="form-card-badge badge-final">Final ★</span>`;
      statusHTML = `<div class="form-card-status s-final">Final review ready</div>`;
    } else if (finalCooling) {
      badgeHTML  = `<span class="form-card-badge badge-cooldown">Final</span>`;
      statusHTML = `<div class="form-card-status">Final in ${fmtCd(state.finalCooldownUntil - now)}</div>`;
    } else if (cdLeft > 0) {
      cardClass += ' state-cooldown';
      badgeHTML  = `<span class="form-card-badge badge-cooldown">${fmtCd(cdLeft)}</span>`;
      statusHTML = `<div class="form-card-status">${fmtCd(cdLeft)}</div>`;
    } else {
      badgeHTML  = `<span class="form-card-badge badge-active">${state.unlockedGroupIds.length} group${state.unlockedGroupIds.length>1?'s':''}</span>`;
      statusHTML = `<div class="form-card-status s-ready">Ready</div>`;
    }

    const groups = form.groups.filter(g => state.unlockedGroupIds.includes(g.id));
    const grpText = groups.map(g => g.name).join(' · ');

    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      ${badgeHTML}
      <div class="form-card-name">${form.name}</div>
      ${statusHTML}`;

    if (finalReady) {
      card.onclick = () => startFinal(form.id);
    } else if (!unread && cdLeft <= 0) {
      card.onclick = () => startPhase1(form.id);
    }

    grid.appendChild(card);
  }
}

function renderReference() {
  const content = document.getElementById('refContent');
  content.querySelectorAll('.ref-section').forEach(s => s.remove());

  let any = false;
  for (const form of FORMS) {
    const confirmed = form.groups.filter(g =>
      formStates[form.id]?.unlockedGroupIds.includes(g.id) && readCards.includes(g.id));
    if (!confirmed.length) continue;
    any = true;

    const sec = document.createElement('div');
    sec.className = 'ref-section';

    let subHTML = '';
    // Usage paragraph above all subgroup headers
    if (form.usage) {
      subHTML += `<div class="ref-usage">${form.usage}</div>`;
    }
    for (const g of confirmed) {
      let exHTML = '';
      for (const ex of g.examples)
        exHTML += `<div class="ref-ex-row"><span class="ref-ex-from">${ex.from}</span><span class="ref-ex-arr">→</span><span class="ref-ex-to">${ex.to}</span><span class="ref-ex-en">${ex.en}</span></div>`;
      const plain = g.body.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      subHTML += `<div class="ref-subgroup"><div class="ref-subgroup-title">${g.name}</div><div class="ref-subgroup-body">${plain}</div><div class="ref-examples">${exHTML}</div></div>`;
    }

    sec.innerHTML = `
      <div class="ref-section-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="ref-section-name">${form.name}</span>
        <span class="ref-section-count">${confirmed.length} group${confirmed.length>1?'s':''}</span>
        <span class="ref-section-toggle">▾</span>
      </div>
      <div class="ref-subgroups">${subHTML}</div>`;
    content.appendChild(sec);
  }

  document.getElementById('refEmpty').style.display = any ? 'none' : 'block';
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    ['sv-fs','sv-rc','sv-gl','sv-st','sv-ss'].forEach(k => localStorage.removeItem(k));
    location.reload();
  }
}

// ════════════════════════════════════════════
// LIVE COUNTDOWN REFRESH
// ════════════════════════════════════════════
setInterval(() => {
  const v = document.getElementById('view-practice');
  if (v.classList.contains('active')) renderPracticeTab();
}, 60000); // refresh every minute

initFirstForm();
renderPracticeTab();
updateHomeStats();
